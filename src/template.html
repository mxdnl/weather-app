<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <div class="topbar">
            <input type="text" placeholder="Search for cities">
        </div>
        
        <div class="main-info-div">
            <div class="info-summary-div">
                <span class="location-and-temp-div">
                    <span class="region">
                        <p class="location city">Manila</p>
                        <p class="location country">Philippines</p>
                    </span>
                    <p class="temperature">31&deg</p>
                </span>
            </div>

            <div class="hourly-forecast-div card">

            </div>

            <div class="weather-conditions-div card">

            </div>
        </div>
    </main>

    <div class="daily-forecast-div card">

    </div>
</body>
</html>
