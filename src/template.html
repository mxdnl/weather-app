<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <div class="topbar">
            <input type="text" placeholder="Search for cities" id="search-city">
        </div>
        
        <div class="main-info-div">
            <div class="info-summary-div">
                <span class="location-div">
                    <p class="location">Manila, Philippines</p>
                    <br>
                    <p class="chance-of-precip">Chance of Precipitation: 0%</p>
                    <br>
                </span>
                <p class="temperature">31&degC</p>
                <img src="assets/sun.png" alt="cloud">
            </div>

            <div class="hourly-forecast-div card">
                <p>TODAY'S FORECAST</p>
                <div class="hourly-forecast">
                    <span class="hour">
                        <p class="time">6:00 AM</p>
                        <img src="assets/rain.png" alt="">
                        <p class="temp">25&degC</p>
                    </span>

                    <span class="hour">
                        <p class="time">9:00 AM</p>
                        <img src="assets/cloud.png" alt="">
                        <p class="temp">29&degC</p>
                    </span>

                    <span class="hour">
                        <p class="time">12:00 PM</p>
                        <img src="assets/sun.png" alt="">
                        <p class="temp">32&degC</p>
                    </span>

                    <span class="hour">
                        <p class="time">3:00 PM</p>
                        <img src="assets/sun.png" alt="">
                        <p class="temp">28&degC</p>
                    </span>

                    <span class="hour">
                        <p class="time">6:00 PM</p>
                        <img src="assets/drizzle.png" alt="">
                        <p class="temp">28&degC</p>
                    </span>

                    <span class="hour last-hour">
                        <p class="time">9:00 PM</p>
                        <img src="assets/cloud.png" alt="">
                        <p class="temp">26&degC</p>
                    </span>
                </div>
            </div>

            <div class="air-conditions-div card">
                <p>AIR CONDITIONS</p>
                <div class="conditions-info">

                </div>
            </div>
        </div>
    </main>

    <div class="daily-forecast-div card">

    </div>
</body>
</html>
